<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>삼성 × B.League · 도구</title>
  <link rel="stylesheet" href="../../theme.css" />
</head>
<body>
  <p style="padding:1rem;color:#94a3b8;font-family:sans-serif">
    통합 사이트는 상위 <code>code/</code> 폴더에서 실행하세요:
    <code>npm run dev</code> → <a href="http://localhost:5173/calc" style="color:#60a5fa">/calc</a>
  </p>
  <div class="calc-app">
    <header class="calc-hero">
      <h1>2번째 용병 슬롯 계산</h1>
      <p>칸터+국내(1빅) · Role W 역산 · stat 입력마다 유사도·코칭 실시간 갱신</p>
    </header>
    <div class="layout">
      <section class="panel inputs">
        <div class="inputs-head">
          <h2>후보 입력</h2>
          <div class="actions"><button type="button" id="btnCalc" class="primary">재계산</button></div>
        </div>
        <label class="field wide"><span>선수명</span><input type="text" id="candidateName" /></label>
        <label class="field"><span>예상 MPG (18~36)</span><input type="number" id="expectedMpg" min="18" max="36" step="0.1" value="27" /></label>
        <h3>프리셋</h3>
        <div class="preset-row">
          <button type="button" id="btnPresetLayman" class="preset">제이크 레이맨</button>
          <button type="button" id="btnPresetWoodbury" class="preset">우드버리 (placeholder)</button>
        </div>
        <h3>Role Load stat</h3>
        <div id="statGrid" class="stat-grid"></div>
      </section>
      <section class="panel output">
        <div class="output-toolbar">
          <div class="mode-switch">
            <span class="toolbar-label">보기 모드</span>
            <button type="button" class="mode-btn active" data-mode="coach">구단용</button>
            <button type="button" class="mode-btn" data-mode="academic">학회용</button>
          </div>
          <span id="verdictBadge" class="badge">—</span>
        </div>
        <nav id="resultNav" class="result-nav" aria-label="결과 섹션"></nav>
        <div id="resultView" class="result-view"></div>
        <details class="md-export" id="mdPanel">
          <summary>Markdown 내보내기 (접기)</summary>
          <div class="report-actions">
            <button type="button" id="btnCopy">복사</button>
            <button type="button" id="btnDownload">.md 저장</button>
          </div>
          <pre id="reportMd" class="report-md"></pre>
        </details>
      </section>
    </div>
  </div>
  <script src="data/baseline.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <script type="module">
    import { initCalc } from "./js/app.js";
    initCalc(document.querySelector(".calc-app")).catch((e) => {
      document.querySelector(".calc-app").innerHTML = `<pre class="calc-error">${e.message}</pre>`;
    });
  </script>
</body>
</html>
